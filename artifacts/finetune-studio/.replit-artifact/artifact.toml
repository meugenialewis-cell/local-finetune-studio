kind = "web"
previewPath = "/"
title = "Local Fine-Tuning Studio"
version = "1.0.0"
id = "artifacts/finetune-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22515

[services.development]
run = "pnpm --filter @workspace/finetune-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finetune-studio", "run", "build" ]
publicDir = "artifacts/finetune-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22515"
BASE_PATH = "/"
