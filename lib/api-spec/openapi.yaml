openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: models
    description: Base model catalog and downloads
  - name: datasets
    description: Dataset upload and preview
  - name: training
    description: Fine-tuning job configuration, execution and export
  - name: chat
    description: Chat sessions with local models, saved as transcripts
  - name: system
    description: Local environment/readiness checks
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /system/status:
    get:
      operationId: getSystemStatus
      tags: [system]
      summary: Local environment readiness
      description: Reports whether this server is running on Apple Silicon with MLX available, and disk space info. Used to warn the user when they are not running the app on their own Mac yet.
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List curated base models
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Model"

  /models/{modelId}:
    get:
      operationId: getModel
      tags: [models]
      summary: Get a single model's detail
      parameters:
        - $ref: "#/components/parameters/ModelIdParam"
      responses:
        "200":
          description: Model detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /models/{modelId}/download:
    post:
      operationId: startModelDownload
      tags: [models]
      summary: Start downloading a model
      parameters:
        - $ref: "#/components/parameters/ModelIdParam"
      responses:
        "202":
          description: Download started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /models/{modelId}/download/events:
    get:
      operationId: streamModelDownloadEvents
      tags: [models]
      summary: Server-sent events stream of download progress
      description: text/event-stream of ModelDownloadEvent payloads
      parameters:
        - $ref: "#/components/parameters/ModelIdParam"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /datasets:
    get:
      operationId: listDatasets
      tags: [datasets]
      summary: List uploaded datasets
      responses:
        "200":
          description: List of datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dataset"
    post:
      operationId: uploadDataset
      tags: [datasets]
      summary: Upload a dataset file (multipart/form-data, field name "file")
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DatasetUpload"
      responses:
        "201":
          description: Dataset uploaded and validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          description: Invalid dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /datasets/{datasetId}:
    get:
      operationId: getDataset
      tags: [datasets]
      summary: Get dataset detail including a row preview
      parameters:
        - $ref: "#/components/parameters/DatasetIdParam"
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDataset
      tags: [datasets]
      summary: Delete an uploaded dataset
      parameters:
        - $ref: "#/components/parameters/DatasetIdParam"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /datasets/from-transcripts:
    post:
      operationId: createDatasetFromTranscripts
      tags: [datasets]
      summary: Build a training dataset from curated chat transcripts
      description: Converts selected exchanges from saved chat sessions into a prompt/response dataset, optionally framed as the model's own memories.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetFromTranscriptsInput"
      responses:
        "201":
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          description: Invalid selection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List saved chat sessions (transcripts)
      responses:
        "200":
          description: List of chat sessions without full message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Start a new chat session with a downloaded model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
        "400":
          description: Invalid session configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions/{sessionId}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Get a chat session including full message history
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Delete a chat session and its transcript file
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions/{sessionId}/messages:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a user message and start generating the reply
      description: Returns immediately; the assistant reply streams over the session's SSE events endpoint.
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "202":
          description: Message accepted, reply generation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
        "400":
          description: Invalid message or a reply is already being generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions/{sessionId}/events:
    get:
      operationId: streamChatEvents
      tags: [chat]
      summary: Server-sent events stream of the session, including the streaming assistant reply
      description: text/event-stream of ChatSession payloads
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /chat/sessions/{sessionId}/download:
    get:
      operationId: downloadChatTranscript
      tags: [chat]
      summary: Download the session transcript as a JSONL file
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Transcript file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /presets:
    get:
      operationId: listPresets
      tags: [training]
      summary: List plain-language training presets
      responses:
        "200":
          description: List of presets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingPreset"

  /jobs:
    get:
      operationId: listJobs
      tags: [training]
      summary: List training jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingJob"
    post:
      operationId: createJob
      tags: [training]
      summary: Create and start a fine-tuning job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingJobInput"
      responses:
        "201":
          description: Job created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingJob"
        "400":
          description: Invalid job configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [training]
      summary: Get a training job's current state
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      tags: [training]
      summary: Cancel a running training job
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/events:
    get:
      operationId: streamJobEvents
      tags: [training]
      summary: Server-sent events stream of training progress and logs
      description: text/event-stream of TrainingJobEvent payloads
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /jobs/{jobId}/export:
    post:
      operationId: exportJob
      tags: [training]
      summary: Export a completed job's fine-tuned model
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportInput"
      responses:
        "202":
          description: Export started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Job not ready for export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/export/download:
    get:
      operationId: downloadJobExport
      tags: [training]
      summary: Download the exported model archive
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: Binary archive download
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or export not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    ModelIdParam:
      name: modelId
      in: path
      required: true
      schema:
        type: string
    DatasetIdParam:
      name: datasetId
      in: path
      required: true
      schema:
        type: string
    JobIdParam:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SystemStatus:
      type: object
      required:
        - isAppleSilicon
        - trainingBackendReady
        - simulationMode
        - platform
        - freeDiskGb
        - message
      properties:
        isAppleSilicon:
          type: boolean
        trainingBackendReady:
          type: boolean
          description: True when real MLX training can run on this machine
        simulationMode:
          type: boolean
          description: True when running somewhere other than the user's Mac; downloads/training are simulated for preview purposes
        platform:
          type: string
        freeDiskGb:
          type: number
        message:
          type: string

    ModelSize:
      type: string
      enum: [small, medium, large]

    ModelStatus:
      type: string
      enum: [not_downloaded, downloading, ready, failed]

    ModelArchitecture:
      type: string
      enum: [transformer, ssm, linear-attention, hybrid]
      description: >
        Core architecture family. Non-transformer types are "fast weights"
        architectures that keep a fixed-size internal memory state instead of
        a growing KV cache (state space models, linear attention / RWKV, and
        attention+SSM hybrids).

    FineTuneSupport:
      type: string
      enum: [supported, experimental, none]
      description: >
        Whether LoRA fine-tuning of this model is a well-trodden path
        (supported), possible but less battle-tested (experimental), or not
        available (none).

    ExportFormat:
      type: string
      enum: [ollama, gguf]

    Model:
      type: object
      required:
        - id
        - name
        - family
        - parameterCount
        - sizeCategory
        - sizeGb
        - description
        - recommendedUse
        - memoryGuidance
        - architecture
        - fineTuneSupport
        - exportFormats
        - status
        - downloadProgress
      properties:
        id:
          type: string
        name:
          type: string
        family:
          type: string
        parameterCount:
          type: string
          description: Human readable parameter count, e.g. "3B"
        sizeCategory:
          $ref: "#/components/schemas/ModelSize"
        sizeGb:
          type: number
        description:
          type: string
        recommendedUse:
          type: string
        memoryGuidance:
          type: string
          description: Plain language guidance, e.g. "Comfortable on any modern Mac"
        architecture:
          $ref: "#/components/schemas/ModelArchitecture"
        fineTuneSupport:
          $ref: "#/components/schemas/FineTuneSupport"
        exportFormats:
          type: array
          items:
            $ref: "#/components/schemas/ExportFormat"
          description: Export formats this model's architecture supports; empty when GGUF/Ollama packaging is unavailable.
        status:
          $ref: "#/components/schemas/ModelStatus"
        downloadProgress:
          type: number
          description: 0 to 100
        error:
          type: ["string", "null"]

    DatasetUpload:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
        name:
          type: string

    DatasetStatus:
      type: string
      enum: [validating, ready, invalid]

    DatasetRow:
      type: object
      required:
        - prompt
        - response
      properties:
        prompt:
          type: string
        response:
          type: string

    Dataset:
      type: object
      required:
        - id
        - name
        - status
        - rowCount
        - sizeBytes
        - createdAt
        - preview
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/DatasetStatus"
        rowCount:
          type: integer
        sizeBytes:
          type: integer
        createdAt:
          type: string
          format: date-time
        preview:
          type: array
          items:
            $ref: "#/components/schemas/DatasetRow"
        error:
          type: ["string", "null"]

    TrainingPreset:
      type: object
      required:
        - id
        - name
        - description
        - estimatedTime
        - epochs
        - learningRate
        - loraRank
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        estimatedTime:
          type: string
          description: Plain language estimate, e.g. "A few minutes"
        epochs:
          type: integer
        learningRate:
          type: number
        loraRank:
          type: integer

    JobStatus:
      type: string
      enum:
        - queued
        - preparing
        - training
        - completed
        - failed
        - cancelled
        - exporting
        - exported

    TrainingJobInput:
      type: object
      required:
        - name
        - modelId
        - datasetId
        - presetId
      properties:
        name:
          type: string
        modelId:
          type: string
        datasetId:
          type: string
        presetId:
          type: string

    TrainingJob:
      type: object
      required:
        - id
        - name
        - modelId
        - modelName
        - datasetId
        - datasetName
        - presetId
        - presetName
        - status
        - progress
        - currentEpoch
        - totalEpochs
        - loss
        - etaSeconds
        - statusMessage
        - simulated
        - createdAt
        - exportReady
      properties:
        id:
          type: string
        name:
          type: string
        modelId:
          type: string
        modelName:
          type: string
        datasetId:
          type: string
        datasetName:
          type: string
        presetId:
          type: string
        presetName:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: number
          description: 0 to 100
        currentEpoch:
          type: integer
        totalEpochs:
          type: integer
        loss:
          type: ["number", "null"]
        etaSeconds:
          type: ["integer", "null"]
        statusMessage:
          type: string
          description: Human readable current status, no jargon or stack traces
        error:
          type: ["string", "null"]
        simulated:
          type: boolean
          description: True if this job ran in simulation mode rather than real MLX training
        createdAt:
          type: string
          format: date-time
        exportReady:
          type: boolean
        exportFormat:
          type: ["string", "null"]
        logs:
          type: array
          description: Recent human-readable log lines for this job (no raw stack traces)
          items:
            type: string
        lossHistory:
          type: array
          description: Loss value recorded at each training step, oldest first, for charting
          items:
            type: number

    ExportInput:
      type: object
      required:
        - format
      properties:
        format:
          type: string
          enum: [ollama, gguf]

    ChatRole:
      type: string
      enum: [user, assistant]

    ChatMessage:
      type: object
      required:
        - role
        - content
        - timestamp
      properties:
        role:
          $ref: "#/components/schemas/ChatRole"
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    ChatSessionInput:
      type: object
      required:
        - modelId
      properties:
        modelId:
          type: string
        jobId:
          type: ["string", "null"]
          description: Optional completed fine-tuning job whose adapter should be applied on top of the base model

    ChatMessageInput:
      type: object
      required:
        - content
      properties:
        content:
          type: string

    ChatSession:
      type: object
      required:
        - id
        - title
        - modelId
        - modelName
        - simulated
        - generating
        - createdAt
        - updatedAt
        - messageCount
        - messages
      properties:
        id:
          type: string
        title:
          type: string
          description: Human readable session title, e.g. first user message snippet
        modelId:
          type: string
        modelName:
          type: string
        jobId:
          type: ["string", "null"]
        jobName:
          type: ["string", "null"]
          description: Name of the fine-tuning job whose adapter is applied, if any
        simulated:
          type: boolean
          description: True when replies are simulated because this isn't running on the user's Mac
        generating:
          type: boolean
          description: True while the assistant reply is still streaming
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
        messages:
          type: array
          description: Full message history (empty in list responses)
          items:
            $ref: "#/components/schemas/ChatMessage"
        error:
          type: ["string", "null"]

    TranscriptSelection:
      type: object
      required:
        - sessionId
        - exchangeIndices
      properties:
        sessionId:
          type: string
        exchangeIndices:
          type: array
          description: Zero-based indices of the kept user/assistant exchange pairs within the session
          items:
            type: integer

    DatasetFromTranscriptsInput:
      type: object
      required:
        - name
        - memoryFraming
        - selections
      properties:
        name:
          type: string
        memoryFraming:
          type: boolean
          description: When true, each example is framed as one of the model's own remembered experiences
        selections:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSelection"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        suggestion:
          type: string
